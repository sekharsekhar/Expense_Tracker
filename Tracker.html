<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Playwrite+AU+SA:wght@100..400&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Tracker.css" />
  </head>
  <body>
    <div class="header">
      <p class="m-0">
        Expense <br />
        Tracker <img src="./" alt="" />
      </p>
    </div>
    <div class="input-form">
      <div class="form-floating input">
        <input
          type="date"
          class="form-control date-input"
          id="floatingInput"
          placeholder="name@example.com"
        />
        <label for="floatingInput">Date</label>
      </div>
      <div class="form-floating inputs">
        <input
          type="email"
          class="form-control amountinput"
          id="floatingInput"
          placeholder="name@example.com"
        />
        <label for="floatingInput">Amount</label>
      </div>
      <select
        class="form-select inputs TransationsType"
        aria-label="Default select example"
      >
        <option selected>Transations Type</option>
        <option value="income">income</option>
        <option value="expense">Expense</option>
      </select>

      <button class="btn" id="add-button" onclick="addRow()">+</button>
    </div>

    <div class="cards mt-4">
      <div class="card" style="width: 18rem">
        <div class="card-body">
          <h5 class="card-title m-0">Total income</h5>
          <h1 class="m-0">
            <img src="" alt="" />
            <span id="totalincome" class="m-0">0</span>
          </h1>
        </div>
      </div>
      <div class="card" style="width: 18rem">
        <div class="card-body">
          <h5 class="card-title m-0">Total Expenses</h5>
          <h1 class="m-0">
            <img src="" alt="" />
            <span id="expense" class="m-0">0</span>
          </h1>
        </div>
      </div>
      <div class="card" style="width: 18rem">
        <div class="card-body">
          <h5 class="card-title m-0">Balance</h5>
          <h1 class="m-0">
            <img src="" alt="" />
            <span id="balance" class="m-0">0</span>
          </h1>
        </div>
      </div>
    </div>

    <table class="transation-table mt-3" id="table">
      <tr id="header-row">
        <th>Amount</th>
        <th>Transaction Type</th>
        <th>Transaction Date</th>
        <th>Action</th>
      </tr>
    </table>

    <script>
      let table = document.getElementById("table");
      console.log("Table:", table);

      function deleteRow(row) {
        console.log(row);
        row.remove();
      }

      function addRow() {
        let date = document.getElementsByClassName("date-input")[0].value;
        let amount = document.getElementsByClassName("amountinput")[0].value;
        let transactiontype =
          document.getElementsByClassName("TransationsType")[0].value;

        let row = document.createElement("tr");

        let amountcell = document.createElement("td");
        amountcell.innerText = amount;

        let transactioncell = document.createElement("td");
        transactioncell.innerText = transactiontype;

        let datecell = document.createElement("td");
        datecell.innerText = date;

        let bincell = document.createElement("td");
        let deleteButton = document.createElement("button");
        let binimage = document.createElement("img");
        binimage.src = "./deleteimage.png";
        binimage.style.width = "25px";
        binimage.style.height = "25px";

        deleteButton.appendChild(binimage);
        deleteButton.classList.add("delete-button");
        deleteButton.onclick = () => deleteRow(row);

        bincell.appendChild(deleteButton);

        row.appendChild(amountcell);
        row.appendChild(transactioncell);
        row.appendChild(datecell);
        row.appendChild(bincell);

        table.appendChild(row);

        let TotalIncome = document.getElementById("totalincome").innerText;
        let TotalExpense = document.getElementById("expense").innerText;
        let Balance = document.getElementById("balance").innerText;
        console.log("line 150:", TotalIncome, TotalExpense, Balance);

        if (transactiontype == "income") {
          if (TotalIncome == "0") {
            document.getElementById("totalincome").innerText = amount;
          } else {
            document.getElementById("totalincome").innerText =
              parseInt(TotalIncome) + parseInt(amount);
          }
          if (Balance == "0") {
            document.getElementById("balance").innerText = amount;
          } else {
            document.getElementById("balance").innerText =
              parseInt(Balance) + parseInt(amount);
          }
        } else if (transactiontype == "expense") {
          if (TotalExpense == "0") {
            document.getElementById("expense").innerText = amount;
          } else {
            document.getElementById("expense").innerText =
              parseInt(TotalIncome) + parseInt(amount);
          }
          if (Balance == "0") {
            document.getElementById("balance").innerText = amount;
          } else {
            document.getElementById("balance").innerText =
              parseInt(Balance) - parseInt(amount);
          }
        }
      }
    </script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.min.js"
      integrity="sha384-VQqxDN0EQCkWoxt/0vsQvZswzTHUVOImccYmSyhJTp7kGtPed0Qcx8rK9h9YEgx+"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
